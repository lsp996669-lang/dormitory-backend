name: Deploy to WeChat Mini Program

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'
        cache: 'pnpm'

    - name: Install pnpm
      uses: pnpm/action-setup@v2
      with:
        version: 8

    - name: Install dependencies
      run: pnpm install

    - name: Build WeChat Mini Program
      run: pnpm build:weapp

    - name: Upload to WeChat
      uses: wechat-miniprogram/ci-action@v1
      with:
        appid: ${{ secrets.WECHAT_APPID }}
        project-path: ./dist-weapp
        private-key: ${{ secrets.WECHAT_PRIVATE_KEY }}
        upload-version: ${{ github.run_number }}
        upload-desc: ${{ github.event.head_commit.message }}
